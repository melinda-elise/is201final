<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goat Genius Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --pink-primary: #c9626e;
            --pink-dark: #a04050;
            --pink-light: #fdf0f2;
        }
        body { background-color: var(--pink-light); color: #2c2c2c; }
        .navbar { background-color: var(--pink-primary) !important; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .nav-link:hover { color: #fce4ec !important; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 10px; }
        footer { background-color: var(--pink-primary); color: #fff; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Elise Lawlor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home &amp; Résumé</a></li>
                    <li class="nav-item"><a class="nav-link" href="scratch.html">Fun Page</a></li>
                    <li class="nav-item"><a class="nav-link active" href="quiz.html">Quiz</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2 class="mb-4 text-center" style="color: var(--pink-dark);">Goat Genius Quiz</h2>

                    <div class="mb-4">
                        <p class="fw-semibold">1. What is a baby goat called?</p>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="q1" id="q1a" value="0">
                            <label class="form-check-label" for="q1a">Puppy</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="q1" id="q1b" value="1">
                            <label class="form-check-label" for="q1b">Kid</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="q1" id="q1c" value="0">
                            <label class="form-check-label" for="q1c">Calf</label>
                        </div>
                    </div>

                    <div class="mb-4">
                        <p class="fw-semibold">2. What do goats famously love to do?</p>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="q2" id="q2a" value="1">
                            <label class="form-check-label" for="q2a">Climb everything</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="q2" id="q2b" value="0">
                            <label class="form-check-label" for="q2b">Fly</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="q2" id="q2c" value="0">
                            <label class="form-check-label" for="q2c">Swim in the ocean</label>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-danger" onclick="checkQuiz()">Submit Answers</button>
                    </div>

                    <div id="result" class="mt-3 text-center fw-bold fs-5"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-3 mt-4">
        <p class="mb-0">&copy; 2024 Elise Lawlor</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function checkQuiz() {
            const q1 = document.querySelector('input[name="q1"]:checked');
            const q2 = document.querySelector('input[name="q2"]:checked');

            if (!q1 || !q2) {
                document.getElementById('result').textContent = 'Please answer all questions.';
                return;
            }

            let score = 0;
            if (q1.value === "1") score++;
            if (q2.value === "1") score++;

            const resultDiv = document.getElementById('result');
            if (score === 2) {
                resultDiv.textContent = '2/2 — You are a Goat Expert!';
            } else {
                resultDiv.textContent = score + '/2 — Try again!';
            }
        }
    </script>
</body>
</html>
